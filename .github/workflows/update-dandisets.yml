name: Update DANDI atlas

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-dandi-atlas
  cancel-in-progress: true

jobs:
  rebuild-map:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install analysis dependencies
        run: pip install -r requirements.txt
      - name: Fetch metadata and rebuild map
        run: python scripts/build_dataset.py
      - name: Commit refreshed data
        run: |
          if git diff --quiet -- public/data/dandisets.json; then
            echo "Map data is already current"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/dandisets.json
          git commit -m "data: refresh DANDI atlas"
          git push
